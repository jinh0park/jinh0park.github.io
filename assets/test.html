<!DOCTYPE html>
<html>

<head>
  <title>My experiment</title>
  <script src="https://unpkg.com/jspsych@7.3.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <link href="https://unpkg.com/jspsych@7.3.1/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <p>sdfsdfsdfsfsdfsd</p>

</body>

<script type="text/javascript">
// 삽입해야 하는 부분

  const params = new Proxy(new URLSearchParams(window.location.search), {
    get: (searchParams, prop) => searchParams.get(prop),
  });
  let confirm_code = params.code;
  let profile_id = params.pid;
  let experiment_id = params.exp;
  console.log(confirm_code);


  function sendComplete() {
    /* Data which will be sent to server */
    let postObj = {
      confirm_code: confirm_code,
      profile_id: Number(profile_id),
      experiment_id: Number(experiment_id)
    }
    let post = JSON.stringify(postObj)
    const url = "https://api.snuling.com/api/experiments/"+experiment_id+"/complete/"
    let xhr = new XMLHttpRequest()
    xhr.open('POST', url, true)
    xhr.setRequestHeader('Content-type', 'application/json; charset=UTF-8')
    xhr.send(post);
    xhr.onload = function() {
      console.log(xhr.status)
    }
  }
</script>

<script>
  /* initialize jsPsych */
  var jsPsych = initJsPsych();

  /* create timeline */
  var timeline = [];

  /* define welcome message trial */
  var welcome = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: "Welcome to the experiment. Press any key to begin."
  };
  timeline.push(welcome);

  /* define instructions trial */
  var instructions = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
        <p>In this experiment, a circle will appear in the center
        of the screen.</p><p>If the circle is <strong>blue</strong>,
        press the letter F on the keyboard as fast as you can.</p>
        <p>If the circle is <strong>orange</strong>, press the letter J
        as fast as you can.</p>
        <div style='width: 700px;'>
        <div style='float: left;'><img src='img/blue.png'></img>
        <p class='small'><strong>Press the F key</strong></p></div>
        <div style='float: right;'><img src='img/orange.png'></img>
        <p class='small'><strong>Press the J key</strong></p></div>
        </div>
        <p>Press any key to begin.</p>
      `,
    post_trial_gap: 2000
  };
  timeline.push(instructions);

  /* start the experiment */
  jsPsych.run(timeline);
</script>

</html>
